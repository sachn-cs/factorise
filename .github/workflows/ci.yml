name: CI

on:
  push:
    branches: ["master"]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

  # Prevent setup-python cache probe failure:
  # logs show `pip cache dir` exits because cache is disabled.
  # Do NOT set PIP_NO_CACHE_DIR anywhere.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-typecheck:
    name: Lint / Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install project
        run: just install

      - name: Ruff
        run: just lint

      - name: MyPy
        run: just type-check

  test:
    name: Tests (Py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install project
        run: just install

      - name: Run tests
        run: |
          pytest \
            --cov=factorise \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            --junitxml=test-results-${{ matrix.python-version }}.xml \
            -v tests/

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml
          if-no-files-found: warn

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      # Permanent fix for local-package pip-audit failure:
      # audit declared third-party deps only, not editable local package.
      - name: Audit third-party dependencies
        run: pip-audit --strict .

  stress:
    name: Stress Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install project
        run: just install

      - name: Run stress tests
        run: just stress-test

  build_release:
    name: Build Release
    needs:
      - lint-and-typecheck
      - test
      - security
      - stress
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set reproducible timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest

      - name: Build distributions
        run: python -m build

      - name: Validate metadata
        run: twine check dist/*

      - name: Test wheel install
        run: |
          python -m venv wheel_env
          wheel_env/bin/pip install dist/*.whl pytest
          mkdir verify-wheel
          cp -r tests verify-wheel/
          cd verify-wheel
          ../wheel_env/bin/pytest -v tests

      - name: Test sdist install
        run: |
          python -m venv sdist_env
          sdist_env/bin/pip install dist/*.tar.gz pytest
          mkdir verify-sdist
          cp -r tests verify-sdist/
          cd verify-sdist
          ../sdist_env/bin/pytest -v tests

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist/*

  publish:
    name: Publish PyPI
    needs: build_release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Prepare publish directory
        run: |
          mkdir publish
          cp dist/*.whl publish/
          cp dist/*.tar.gz publish/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish