name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

# Cancel in-progress runs for PRs to save resources and reduce noise
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Ensure deterministic behaviour and suppress noisy upgrade checks
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "off"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      # Fast setup using prebuilt binary for execution orchestration
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install dependencies
        run: just install
      # Fails fast on syntax or style errors before deep checks
      - name: Run Ruff linter
        run: just lint
      - name: Run MyPy type checker
        run: just type-check


  # Centralised test suite across supported matrix
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Allow other versions to finish and report even if one version fails
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install dependencies
        run: just install
      # We decouple test runner args in workflow to preserve matrix-specific outputs
      - name: Run Pytest Test Suite
        run: |
          pytest --cov=factorise --cov-fail-under=90 --junitxml=test-results-${{ matrix.python-version }}.xml -v tests/
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml

  security-and-stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install dependencies
        run: just install
      # Security audit gate must pass to ensure no known CVEs
      - name: Run security audit
        run: just security
      - name: Run stress correctness gate
        run: just stress-test

  build_release:
    # Requires all previous gates to pass before proceeding
    needs: [lint-and-typecheck, test, security-and-stress]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # Hardcode epoch to ensure binary artifacts are reproducible bit-for-bit
      - name: Derive reproducible build timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install dependencies
        run: just install
      - name: Build sdist and wheel
        run: just build
      # Ensure built artifacts don't have broken imports or missing files
      - name: Test built wheel in isolated venv
        run: |
          python -m venv test_env
          test_env/bin/pip install dist/*.whl pytest
          test_env/bin/pytest -v tests/
      - name: Check dist artifacts
        run: twine check dist/*
      - name: Generate SBOM (CycloneDX)
        run: cyclonedx-py environment --output-format JSON --output-file dist/sbom.cdx.json
      # Hashes safeguard against silent artifact corruption post-build
      - name: Generate artifact checksums
        run: sha256sum dist/* > dist/SHA256SUMS
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

  publish:
    needs: [build_release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      # OIDC id-tokens required for PyPI Trusted Publishers
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist
      - name: Prepare publish directory
        run: |
          mkdir -p publish
          cp dist/*.whl publish/ || true
          cp dist/*.tar.gz publish/ || true
      - name: Publish package via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish
