name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[dev]"

    - name: Run Black Formatter Check
      run: black --check src/ tests/ benchmarks/

    - name: Run isort Import Check
      run: isort --check src/ tests/ benchmarks/

    - name: Run Flake8 Linter
      run: flake8 --extend-ignore=E501 src/ tests/ benchmarks/

    - name: Run Pylint
      run: pylint src/ tests/ benchmarks/

    - name: Run MyPy Type Checker
      run: mypy src/ tests/ benchmarks/

    - name: Run Pytest Test Suite
      run: pytest --cov=factorise -v tests/
