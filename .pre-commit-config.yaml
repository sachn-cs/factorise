default_language_version:
  python: python3.13
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy type check
        entry: mypy src/
        language: system
        types: [python]
        pass_filenames: false

      - id: clean-benchmarks
        name: clean stale benchmarks
        entry: rm -rf .benchmarks/
        language: system
        pass_filenames: false
        always_run: true
